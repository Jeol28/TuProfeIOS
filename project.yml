name: TuProfeIOS
options:
  bundleIdPrefix: com.tuprofe
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.20.0
  SDWebImageSwiftUI:
    url: https://github.com/SDWebImage/SDWebImageSwiftUI
    from: 3.0.0

targets:
  TuProfeIOS:
    type: application
    platform: iOS
    sources:
      - TuProfeIOS
    resources:
      - TuProfeIOS/Resources/fondo.jpeg
      - TuProfeIOS/Resources/fondo-dark.jpeg
      - TuProfeIOS/Resources/img.png
      - TuProfeIOS/Resources/img-dark.png
      - TuProfeIOS/Resources/loading_logo.gif
      - TuProfeIOS/Resources/loading_logo-dark.gif
      - TuProfeIOS/Resources/bebasneueregular.ttf
      - TuProfeIOS/Resources/montserrat.ttf
      - TuProfeIOS/Supporting/GoogleService-Info.plist
      - TuProfeIOS/Assets.xcassets
    info:
      path: TuProfeIOS/Supporting/Info.plist
      properties:
        CFBundleName: TuProfe
        CFBundleDisplayName: TuProfe
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        NSLocationWhenInUseUsageDescription: "Necesitamos tu ubicación para asociarla a tu reseña"
        NSLocationAlwaysAndWhenInUseUsageDescription: "Necesitamos tu ubicación para asociarla a tu reseña"
        NSCameraUsageDescription: "Necesitamos la cámara para actualizar tu foto de perfil"
        NSPhotoLibraryUsageDescription: "Necesitamos acceso a tu galería para actualizar tu foto de perfil"
        UIBackgroundModes:
          - remote-notification
        FirebaseAppDelegateProxyEnabled: false
        UIAppFonts:
          - bebasneueregular.ttf
          - montserrat.ttf
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseAnalytics
      - package: SDWebImageSwiftUI
        product: SDWebImageSwiftUI
    settings:
      base:
        SWIFT_VERSION: 5.9
        IPHONEOS_DEPLOYMENT_TARGET: 16.0
        PRODUCT_BUNDLE_IDENTIFIER: com.tuprofe.ios
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor